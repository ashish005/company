<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Logo Icon -->
  <g filter="url(#shadow)">
    <!-- Main hexagon shape -->
    <polygon points="60,20 100,40 100,80 60,100 20,80 20,40" fill="url(#mainGrad)" stroke="#ffffff" stroke-width="2"/>
    
    <!-- Inner design - stylized E -->
    <text x="60" y="72" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">E</text>
    
    <!-- Tech circuit lines -->
    <line x1="25" y1="45" x2="45" y2="45" stroke="white" stroke-width="2" opacity="0.7"/>
    <line x1="75" y1="45" x2="95" y2="45" stroke="white" stroke-width="2" opacity="0.7"/>
    <line x1="25" y1="75" x2="45" y2="75" stroke="white" stroke-width="2" opacity="0.7"/>
    <line x1="75" y1="75" x2="95" y2="75" stroke="white" stroke-width="2" opacity="0.7"/>
    
    <!-- Connection dots -->
    <circle cx="35" cy="45" r="3" fill="#10b981"/>
    <circle cx="85" cy="45" r="3" fill="#10b981"/>
    <circle cx="35" cy="75" r="3" fill="#10b981"/>
    <circle cx="85" cy="75" r="3" fill="#10b981"/>
  </g>
  
  <!-- Company Name -->
  <text x="130" y="55" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#1e3a8a">EnRator</text>
  <text x="130" y="85" font-family="Arial, sans-serif" font-size="18" fill="#64748b" letter-spacing="2">SOFTWARE PVT LTD</text>
  
  <!-- Accent underline -->
  <line x1="130" y1="95" x2="380" y2="95" stroke="url(#accentGrad)" stroke-width="3" stroke-linecap="round"/>
</svg>
