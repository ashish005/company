<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="faviconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main hexagon shape -->
  <polygon points="32,8 56,20 56,44 32,56 8,44 8,20" fill="url(#faviconGrad)" stroke="#ffffff" stroke-width="2"/>
  
  <!-- Stylized E -->
  <text x="32" y="42" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle">E</text>
  
  <!-- Tech circuit lines -->
  <line x1="12" y1="24" x2="24" y2="24" stroke="white" stroke-width="2" opacity="0.7"/>
  <line x1="40" y1="24" x2="52" y2="24" stroke="white" stroke-width="2" opacity="0.7"/>
  <line x1="12" y1="40" x2="24" y2="40" stroke="white" stroke-width="2" opacity="0.7"/>
  <line x1="40" y1="40" x2="52" y2="40" stroke="white" stroke-width="2" opacity="0.7"/>
  
  <!-- Connection dots -->
  <circle cx="18" cy="24" r="2" fill="#10b981"/>
  <circle cx="46" cy="24" r="2" fill="#10b981"/>
  <circle cx="18" cy="40" r="2" fill="#10b981"/>
  <circle cx="46" cy="40" r="2" fill="#10b981"/>
</svg>
